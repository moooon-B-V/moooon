<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1025" height="1025" viewBox="0 0 1025 1025">
  <defs>
    <clipPath id="eye-cutout">
      <path d="M 0 0 H 1025 V 1025 H 0 Z
               M 768.5 512.5 a 128 128 0 1 0 0.001 0 Z" clip-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- Main blue shape with eye cutout -->
  <g clip-path="url(#eye-cutout)">
    <!-- Four left-side circles (bumpy edge) -->
    <ellipse cx="128.5" cy="128.5" rx="128" ry="128" fill="#360eff"/>
    <ellipse cx="128.5" cy="384.5" rx="128" ry="128" fill="#360eff"/>
    <ellipse cx="128.5" cy="640.5" rx="128" ry="128" fill="#360eff"/>
    <ellipse cx="128.5" cy="896.5" rx="128" ry="128" fill="#360eff"/>

    <!-- Large curved body -->
    <path d="M 128.5 0.5 Q 1024.5 0.5 1024.5 512.5 Q 1024.5 1024.5 128.5 1024.5 Z" fill="#360eff"/>
  </g>

  <!-- Person figure inside the eye: head -->
  <ellipse cx="768.5" cy="640.5" rx="32" ry="32" fill="#360eff"/>
  <!-- Person figure inside the eye: body -->
  <ellipse cx="768.5" cy="736.5" rx="40" ry="64" fill="#360eff"/>
</svg>
